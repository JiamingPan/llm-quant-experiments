model:
  name: Qwen/Qwen3-1.7B
  trust_remote_code: true
  torch_dtype: float16
  device_map: auto

quantization:
  bits: 2
  group_size: 128
  symmetric: false

detection:
  uo:
    fp16_ppl_budget: 0.005      # max relative FP16 PPL damage (0.5%)
    packet_size: 1              # candidates per admission test
    max_candidates_per_layer: 100
  sw:
    percentile: 99.99           # outlier threshold for down_proj

calibration:
  dataset: wikitext
  dataset_config: wikitext-2-raw-v1
  split: train
  n_samples: 128
  max_length: 512

eval:
  dataset: wikitext
  dataset_config: wikitext-2-raw-v1
  split: test
  max_length: 512

output:
  dir: results/
  uo_candidates: results/uo_candidates_1b7.json
  diagnostics_plot: results/figures/depthwise_1b7.png
